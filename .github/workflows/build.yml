name: ArkUIPlayer Build CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.mm'
      - '**.m'
      - '.github/workflows/build.yml'
      - 'ArkUIPlayer/**'
      - 'foundation/**'
      - 'base/**'
      - 'commonlibrary/**'
  pull_request:
    branches: [ main, develop ]

jobs:
  build-app:
    name: Build ArkUIPlayer App
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Clean workspace
      run: |
        echo "🔍 Cleaning workspace..."
        rm -rf foundation base commonlibrary out build ArkUIPlayer.xcarchive ArkUIPlayer-IPA
        
        echo "🔍 Restoring clean project.pbxproj file..."
        git checkout -- ArkUIPlayer/ArkUIPlayer.xcodeproj/project.pbxproj

    - name: Install system dependencies
      run: |
        echo "🔍 Installing system dependencies..."
        brew install wget gnu-tar 2>/dev/null || true
        echo "✅ System dependencies installed"

    - name: Setup Node.js 16
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install ACE Tools
      run: |
        echo "🔍 Installing ACE Tools..."
        npm install -g @arkui-x/ace-tools 2>&1 || npm install -g @arkui-x/ace-cli 2>&1 || true
        
        if command -v ace &> /dev/null; then
          echo "✅ ACE Tools installed: $(ace --version)"
        else
          echo "⚠️ ACE Tools installation failed"
        fi

    - name: Download ArkUI-X SDK from official Huawei mirror
      run: |
        echo "🔍 Downloading ArkUI-X SDK from official Huawei mirror..."
        
        SDK_URLS=(
          "https://repo.huaweicloud.com/arkui-crossplatform/sdk/0.0.9.6/darwin/arkui-x-darwin-x64-0.0.9.6-Canary1.zip"
          "https://repo.huaweicloud.com/arkui-crossplatform/sdk/0.0.9.6/darwin/arkui-x-darwin-arm64-0.0.9.6-Canary1.zip"
        )
        
        DOWNLOAD_SUCCESS=0
        
        for url in "${SDK_URLS[@]}"; do
          echo "Trying: $url"
          echo "Checking URL availability..."
          curl -sI "$url" | head -5
          
          echo "Starting download with wget (supports resume)... "
          if wget -c "$url" -O arkui-x-sdk.zip --timeout=60 --tries=5 --waitretry=10; then
            file_size=$(wc -c < arkui-x-sdk.zip)
            echo "File size: $file_size bytes"
            
            if [ "$file_size" -gt 1000000 ]; then
              echo "✅ Downloaded large file ($(($file_size/1024/1024))MB), unzipping..."
              unzip -o arkui-x-sdk.zip -d arkui-x-sdk/ 2>&1
              rm arkui-x-sdk.zip
              
              echo "📁 SDK directory contents:"
              ls -la arkui-x-sdk/ 2>/dev/null || echo "arkui-x-sdk directory is empty"
              find arkui-x-sdk -type f | head -50
              
              echo "✅ SDK downloaded successfully"
              DOWNLOAD_SUCCESS=1
              break
            else
              echo "⚠️ File too small ($file_size bytes), skipping"
              rm arkui-x-sdk.zip
            fi
          else
            echo "⚠️ wget download failed, trying curl..."
            
            if curl -L "$url" -o arkui-x-sdk.zip --fail --max-time 900 --retry 3 --retry-delay 5 --continue-at -; then
              file_size=$(wc -c < arkui-x-sdk.zip)
              echo "File size: $file_size bytes"
              
              if [ "$file_size" -gt 1000000 ]; then
                echo "✅ Downloaded large file ($(($file_size/1024/1024))MB), unzipping..."
                unzip -o arkui-x-sdk.zip -d arkui-x-sdk/ 2>&1
                rm arkui-x-sdk.zip
                
                echo "📁 SDK directory contents:"
                ls -la arkui-x-sdk/ 2>/dev/null || echo "arkui-x-sdk directory is empty"
                find arkui-x-sdk -type f | head -50
                
                echo "✅ SDK downloaded successfully"
                DOWNLOAD_SUCCESS=1
                break
              else
                echo "⚠️ File too small ($file_size bytes), skipping"
                rm arkui-x-sdk.zip
              fi
            else
              echo "⚠️ Download failed: $url"
            fi
          fi
        done
        
        if [ "$DOWNLOAD_SUCCESS" -eq 0 ]; then
          echo "❌ Failed to download ArkUI-X SDK from all sources!"
          exit 1
        fi

    - name: Verify SDK structure and find framework
      run: |
        echo "🔍 Verifying SDK structure..."
        
        if [ ! -d "arkui-x-sdk" ]; then
          echo "❌ arkui-x-sdk directory not found!"
          exit 1
        fi
        
        echo "📁 Full SDK directory listing:"
        ls -laR arkui-x-sdk/
        
        echo ""
        echo "🔍 Searching for XCFramework and framework files..."
        
        XCFRAMEWORK=$(find arkui-x-sdk -name "*.xcframework" -type d | head -1)
        FRAMEWORK=$(find arkui-x-sdk -name "*.framework" -type d | head -1)
        
        echo "Found XCFramework: $XCFRAMEWORK"
        echo "Found Framework: $FRAMEWORK"
        
        if [ -z "$XCFRAMEWORK" ] && [ -z "$FRAMEWORK" ]; then
          echo "❌ Neither XCFramework nor Framework found in SDK!"
          echo "Listing all files to debug:"
          find arkui-x-sdk -type f
          exit 1
        fi

    - name: Copy ArkUI-X framework to project
      run: |
        echo "🔍 Copying ArkUI-X framework to project..."
        
        echo "📋 Listing all XCFramework files in SDK..."
        find arkui-x-sdk -name "*.xcframework" -type d
        
        ARKUI_XCFRAMEWORK=$(find arkui-x-sdk -name "libarkui_ios.xcframework" -type d | head -1)
        
        if [ -z "$ARKUI_XCFRAMEWORK" ]; then
          echo "⚠️ libarkui_ios.xcframework not found, searching for other arkui XCFrameworks..."
          find arkui-x-sdk -name "*arkui*.xcframework" -type d
          
          ARKUI_XCFRAMEWORK=$(find arkui-x-sdk -name "*arkui*.xcframework" -type d | head -1)
        fi
        
        mkdir -p ArkUIPlayer/Frameworks
        
        if [ -n "$ARKUI_XCFRAMEWORK" ]; then
          echo "✅ Found ArkUI XCFramework at: $ARKUI_XCFRAMEWORK"
          cp -r "$ARKUI_XCFRAMEWORK" ArkUIPlayer/Frameworks/
          echo "✅ Copied XCFramework to Frameworks"
        else
          echo "❌ No ArkUI framework found!"
          exit 1
        fi
        
        echo "📁 Frameworks directory contents:"
        ls -la ArkUIPlayer/Frameworks/
        
        if [ -d "ArkUIPlayer/Frameworks/libarkui_ios.xcframework" ]; then
          echo "✅ libarkui_ios.xcframework found in project"
          sed -i '' 's/#define HAS_ARKUI_X 0/#define HAS_ARKUI_X 1/' ArkUIPlayer/ArkUIPlayer/HAPManager.h
          echo "✅ Set HAS_ARKUI_X=1"
        elif [ -d "ArkUIPlayer/Frameworks/libarkui_ios.framework" ]; then
          echo "✅ libarkui_ios.framework found in project"
          sed -i '' 's/#define HAS_ARKUI_X 0/#define HAS_ARKUI_X 1/' ArkUIPlayer/ArkUIPlayer/HAPManager.h
          echo "✅ Set HAS_ARKUI_X=1"
        else
          FRAMEWORK_NAME=$(basename "$ARKUI_XCFRAMEWORK")
          echo "⚠️ Using $FRAMEWORK_NAME instead of libarkui_ios"
          sed -i '' 's/#define HAS_ARKUI_X 0/#define HAS_ARKUI_X 1/' ArkUIPlayer/ArkUIPlayer/HAPManager.h
          echo "✅ Set HAS_ARKUI_X=1"
        fi

    - name: Build ArkUIPlayer using xcodebuild
      run: |
        echo "🔍 Building ArkUIPlayer app..."
        
        cd ArkUIPlayer
        
        FRAMEWORK_DIR="Frameworks"
        FRAMEWORKS_IN_DIR=$(ls -la "$FRAMEWORK_DIR" 2>/dev/null | grep xcframework | awk '{print $9}')
        
        HEADER_SEARCH_PATHS=""
        LIBRARY_SEARCH_PATHS=""
        OTHER_LDFLAGS=""
        
        if [ -n "$FRAMEWORKS_IN_DIR" ]; then
          echo "Found frameworks in Frameworks: $FRAMEWORKS_IN_DIR"
          
          for fw in $FRAMEWORKS_IN_DIR; do
            FW_NAME=$(echo "$fw" | sed 's/\.xcframework$//')
            echo "Processing framework: $FW_NAME"
            
            HEADER_PATH="$FRAMEWORK_DIR/$fw/ios-arm64/$FW_NAME.framework/Headers"
            HEADER_PATH_SIM="$FRAMEWORK_DIR/$fw/ios-arm64_x86_64-simulator/$FW_NAME.framework/Headers"
            
            if [ -d "$HEADER_PATH" ]; then
              HEADER_SEARCH_PATHS="$HEADER_SEARCH_PATHS $HEADER_PATH"
            fi
            if [ -d "$HEADER_PATH_SIM" ]; then
              HEADER_SEARCH_PATHS="$HEADER_SEARCH_PATHS $HEADER_PATH_SIM"
            fi
            
            OTHER_LDFLAGS="$OTHER_LDFLAGS -framework $FW_NAME"
          done
          
          LIBRARY_SEARCH_PATHS="."
        fi
        
        echo "Header search paths: $HEADER_SEARCH_PATHS"
        echo "Library search paths: $LIBRARY_SEARCH_PATHS"
        echo "Other LDFlags: $OTHER_LDFLAGS"
        
        if [ -n "$HEADER_SEARCH_PATHS" ] && [ -n "$OTHER_LDFLAGS" ]; then
          xcodebuild -project ArkUIPlayer.xcodeproj \
            -scheme ArkUIPlayer \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            HEADER_SEARCH_PATHS="$HEADER_SEARCH_PATHS" \
            LIBRARY_SEARCH_PATHS="$LIBRARY_SEARCH_PATHS" \
            OTHER_LDFLAGS="\$(inherited) $OTHER_LDFLAGS" 2>&1 || { echo "❌ Build failed"; exit 1; }
        else
          xcodebuild -project ArkUIPlayer.xcodeproj \
            -scheme ArkUIPlayer \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 2>&1 || { echo "❌ Build failed"; exit 1; }
        fi
        
        echo "✅ Build completed"
        
        echo "Searching for .app files..."
        find build -name "*.app" -type d 2>/dev/null
        
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Found .app at: $APP_PATH"
          ls -la "$APP_PATH/"
          du -sh "$APP_PATH"
        else
          echo "❌ .app file not found!"
          exit 1
        fi

    - name: Package unsigned IPA manually
      run: |
        echo "🔍 Packaging unsigned IPA manually..."
        
        cd ArkUIPlayer
        
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ .app file not found!"
          exit 1
        fi
        
        echo "Found .app at: $APP_PATH"
        ls -la "$APP_PATH/"
        du -sh "$APP_PATH"
        
        mkdir -p ArkUIPlayer-IPA/Payload
        cp -r "$APP_PATH" ArkUIPlayer-IPA/Payload/
        
        echo "Listing Payload directory:"
        ls -la ArkUIPlayer-IPA/Payload/
        
        cd ArkUIPlayer-IPA
        zip -r ArkUIPlayer.ipa Payload/
        cd ..
        
        echo "✅ Unsigned IPA packaged successfully"
        
        ls -la ArkUIPlayer-IPA/
        du -sh ArkUIPlayer-IPA/ArkUIPlayer.ipa

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: ArkUIPlayer-unsigned
        path: ArkUIPlayer/ArkUIPlayer-IPA/ArkUIPlayer.ipa
        retention-days: 7
