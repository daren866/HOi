name: ArkUIPlayer Build CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.mm'
      - '**.m'
      - '.github/workflows/build.yml'
      - 'ArkUIPlayer/**'
  pull_request:
    branches: [ main, develop ]

jobs:
  build-app:
    name: Build ArkUIPlayer App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Verify project files
      run: |
        echo "🔍 Verifying project files..."
        ls -la ArkUIPlayer/
        ls -la ArkUIPlayer/ArkUIPlayer/
        ls -la ArkUIPlayer/ArkUIPlayer.xcodeproj/
        cat ArkUIPlayer/ArkUIPlayer/HAPManager.h | head -10

    - name: Build ArkUIPlayer using xcodebuild
      run: |
        echo "🔍 Building ArkUIPlayer app..."
        
        cd ArkUIPlayer
        
        xcodebuild -project ArkUIPlayer.xcodeproj \
          -scheme ArkUIPlayer \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          IPHONEOS_DEPLOYMENT_TARGET=13.0
        
        echo "✅ Build completed"
        
        find . -name "*.app" -type d 2>/dev/null
        
        APP_PATH=$(find . -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Found .app at: $APP_PATH"
          ls -la "$APP_PATH/"
          du -sh "$APP_PATH"
        else
          echo "❌ .app file not found!"
          exit 1
        fi

    - name: Package unsigned IPA manually
      run: |
        echo "🔍 Packaging unsigned IPA manually..."
        
        cd ArkUIPlayer
        
        APP_PATH=$(find . -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ .app file not found!"
          exit 1
        fi
        
        echo "Found .app at: $APP_PATH"
        ls -la "$APP_PATH/"
        du -sh "$APP_PATH"
        
        mkdir -p ArkUIPlayer-IPA/Payload
        cp -r "$APP_PATH" ArkUIPlayer-IPA/Payload/
        
        echo "Listing Payload directory:"
        ls -la ArkUIPlayer-IPA/Payload/
        
        cd ArkUIPlayer-IPA
        zip -r ArkUIPlayer.ipa Payload/
        cd ..
        
        echo "✅ Unsigned IPA packaged successfully"
        
        ls -la ArkUIPlayer-IPA/
        du -sh ArkUIPlayer-IPA/ArkUIPlayer.ipa

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: ArkUIPlayer-unsigned
        path: ArkUIPlayer/ArkUIPlayer-IPA/ArkUIPlayer.ipa
        retention-days: 7
