name: ArkUI iOS Platform Adaptation CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.mm'
      - '**.m'
      - '**.gn'
      - '**.gni'
      - '.clang-format'
      - '.github/workflows/build.yml'
      - 'ArkUIPlayer/**'
      - 'foundation/**'
      - 'base/**'
      - 'commonlibrary/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.mm'
      - '**.m'
      - '**.gn'
      - '**.gni'
      - '.clang-format'
      - 'ArkUIPlayer/**'
      - 'foundation/**'
      - 'base/**'
      - 'commonlibrary/**'

jobs:
  lint:
    name: Code Linting & Formatting
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        brew install clang-format

    - name: Check code formatting
      run: |
        echo "🔍 Checking code formatting with clang-format..."
        find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.mm" -o -name "*.m" \) \
          -not -path "./.git/*" \
          -exec clang-format --dry-run --Werror {} \;
        echo "✅ Code formatting check passed!"

  file-check:
    name: File Structure Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate required BUILD.gn files
      run: |
        echo "🔍 Validating BUILD.gn files structure..."
        
        REQUIRED_BUILD_FILES=(
          "build/BUILD.gn"
          "entrance/BUILD.gn"
          "stage/ability/BUILD.gn"
          "stage/uicontent/BUILD.gn"
          "osal/BUILD.gn"
          "capability/BUILD.gn"
        )
        
        MISSING_FILES=()
        for file in "${REQUIRED_BUILD_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            MISSING_FILES+=("$file")
          fi
        done
        
        if [ ${#MISSING_FILES[@]} -gt 0 ]; then
          echo "❌ Missing required BUILD.gn files:"
          for file in "${MISSING_FILES[@]}"; do
            echo "  - $file"
          done
          exit 1
        else
          echo "✅ All required BUILD.gn files exist"
        fi

    - name: Validate config.gni and platform.gni
      run: |
        echo "🔍 Validating GN configuration files..."
        
        if [ ! -f "build/config.gni" ]; then
          echo "❌ Missing build/config.gni"
          exit 1
        fi
        
        if [ ! -f "build/platform.gni" ]; then
          echo "❌ Missing build/platform.gni"
          exit 1
        fi
        
        echo "✅ GN configuration files exist"

    - name: Validate BUILD.gn source file references
      run: |
        echo "🔍 Validating BUILD.gn source file references..."
        
        ERROR_COUNT=0
        
        for gn_file in $(find . -name "BUILD.gn" -not -path "./.git/*"); do
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^\s*(sources|deps|include_dirs)\s*='; then
              continue
            fi
            
            matched_files=$(echo "$line" | grep -oE '"[^"]+\.(cpp|h|mm|m)"' | sed 's/"//g')
            for ref_file in $matched_files; do
              if echo "$ref_file" | grep -qE '(\$|^//|ace_root|ace_engine|frameworks/core|interfaces/native)'; then
                continue
              fi
              
              gn_dir=$(dirname "$gn_file")
              full_path="$gn_dir/$ref_file"
              
              if [ ! -f "$full_path" ]; then
                echo "❌ $gn_file references missing file: $ref_file"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            done
          done < "$gn_file"
        done
        
        if [ $ERROR_COUNT -gt 0 ]; then
          echo "❌ Found $ERROR_COUNT missing file references in BUILD.gn"
          exit 1
        else
          echo "✅ All BUILD.gn source file references are valid"
        fi

    - name: Check for orphaned source files
      run: |
        echo "🔍 Checking for source files not referenced in BUILD.gn..."
        
        all_sources=$(find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.mm" -o -name "*.m" \) \
          -not -path "./.git/*" | sort)
        
        referenced_sources=$(grep -h -oE '"[^"]+\.(cpp|h|mm|m)"' $(find . -name "BUILD.gn" -not -path "./.git/*") | \
          sed 's/"//g' | sort)
        
        orphaned_files=()
        while IFS= read -r source_file; do
          file_name=$(basename "$source_file")
          if ! echo "$referenced_sources" | grep -q "$file_name"; then
            orphaned_files+=("$source_file")
          fi
        done <<< "$all_sources"
        
        if [ ${#orphaned_files[@]} -gt 0 ]; then
          echo "⚠️ Found ${#orphaned_files[@]} potential orphaned files:"
          for file in "${orphaned_files[@]}"; do
            echo "  - $file"
          done
        else
          echo "✅ No orphaned source files found"
        fi

  header-check:
    name: Header Guard Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate header guards
      run: |
        echo "🔍 Validating header guards in .h files..."
        
        WARN_COUNT=0
        
        for header_file in $(find . -name "*.h" -not -path "./.git/*"); do
          guard_name=$(grep "^#ifndef " "$header_file" | awk '{print $2}')
          
          if [ -z "$guard_name" ]; then
            echo "⚠️ $header_file: Missing #ifndef guard"
            WARN_COUNT=$((WARN_COUNT + 1))
            continue
          fi
          
          if ! grep -q "^#define $guard_name" "$header_file"; then
            echo "⚠️ $header_file: #define guard name mismatch (expected: $guard_name)"
            WARN_COUNT=$((WARN_COUNT + 1))
          fi
        done
        
        if [ $WARN_COUNT -gt 0 ]; then
          echo "⚠️ Found $WARN_COUNT header guard warnings (non-fatal)"
        else
          echo "✅ All header guards are valid"
        fi

  syntax-check:
    name: Basic Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Run cppcheck for syntax errors
      run: |
        echo "🔍 Running cppcheck for basic syntax errors..."
        
        cppcheck --quiet --error-exitcode=1 \
          --enable=warning \
          --suppress=missingInclude \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --suppress=unusedVariable \
          . 2>&1 || true
        
        echo "✅ Basic syntax check completed"

  build-app:
    name: Build ArkUIPlayer App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Clone ArkUI-X Dependencies
      uses: actions/cache@v4
      id: cache-deps
      with:
        path: |
          foundation/arkui/ace_engine/frameworks
          foundation/arkui/ace_engine/interfaces
          foundation/appframework
          foundation/arkui/napi
          base/hiviewdfx/hilog
          commonlibrary/c_utils
          foundation/graphic/graphic_2d
        key: arkui-x-deps-${{ hashFiles('clone_arkui_x.sh') }}

    - name: Fetch ArkUI-X Dependencies (if not cached)
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        echo "🔍 Cloning ArkUI-X dependencies..."
        
        git config --global credential.helper ""
        git config --global protocol.version 2
        
        rm -rf foundation/arkui/ace_engine
        rm -rf foundation/appframework
        rm -rf foundation/arkui/napi
        rm -rf base/hiviewdfx/hilog
        rm -rf commonlibrary/c_utils
        rm -rf foundation/graphic/graphic_2d

        GIT_TERMINAL_PROMPT=0 git clone --depth 1 --sparse https://github.com/openharmony/ace_engine.git foundation/arkui/ace_engine
        cd foundation/arkui/ace_engine
        git sparse-checkout set frameworks/base frameworks/core interfaces/native
        cd ../..

        GIT_TERMINAL_PROMPT=0 git clone --depth 1 --sparse https://github.com/openharmony/appframework.git foundation/appframework
        cd foundation/appframework
        git sparse-checkout set appexecfwk
        cd ../..

        GIT_TERMINAL_PROMPT=0 git clone --depth 1 --sparse https://github.com/openharmony/arkui_napi.git foundation/arkui/napi
        cd foundation/arkui/napi
        git sparse-checkout set ace_napi
        cd ../..

        GIT_TERMINAL_PROMPT=0 git clone --depth 1 --sparse https://github.com/openharmony/hilog.git base/hiviewdfx/hilog
        cd base/hiviewdfx/hilog
        git sparse-checkout set hilog_lite
        cd ../../..

        GIT_TERMINAL_PROMPT=0 git clone --depth 1 --sparse https://github.com/openharmony/c_utils.git commonlibrary/c_utils
        cd commonlibrary/c_utils
        git sparse-checkout set base
        cd ../..

        GIT_TERMINAL_PROMPT=0 git clone --depth 1 --sparse https://github.com/openharmony/graphic_2d.git foundation/graphic/graphic_2d
        cd foundation/graphic/graphic_2d
        git sparse-checkout set rosen
        cd ../..

        echo "✅ ArkUI-X dependencies cloned successfully"

    - name: Setup Directory Symlinks
      run: |
        echo "🔍 Setting up directory symlinks..."
        
        mkdir -p foundation/arkui/ace_engine/adapter/ios
        
        cd foundation/arkui/ace_engine/adapter/ios
        
        rm -f build capability entrance stage osal
        
        ln -s ../../../../../build build
        ln -s ../../../../../capability capability
        ln -s ../../../../../entrance entrance
        ln -s ../../../../../stage stage
        ln -s ../../../../../osal osal
        
        cd ../../../../../
        
        echo "✅ Directory symlinks set up successfully"
        
        ls -la foundation/arkui/ace_engine/adapter/ios/

    - name: Install GN and Ninja
      run: |
        echo "🔍 Installing GN and Ninja..."
        
        brew install gn ninja 2>/dev/null || true
        
        if ! command -v gn &> /dev/null; then
          echo "⚠️ GN not found, downloading..."
          curl -L https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-mac.zip -o ninja.zip
          unzip -o ninja.zip -d /usr/local/bin/
          rm ninja.zip
          
          curl -L https://chrome-infra-packages.appspot.com/dl/gn/gn/mac-amd64/+/git_revision:e98d0cd0a8b9a5940687a19c2c19137038675e61 -o gn.zip
          unzip -o gn.zip -d /usr/local/bin/
          rm gn.zip
        fi
        
        gn --version
        ninja --version
        
        echo "✅ GN and Ninja installed"

    - name: Build libarkui_ios (GN/Ninja)
      id: build-libarkui
      continue-on-error: true
      run: |
        echo "🔍 Building libarkui_ios.a using GN/Ninja..."
        
        mkdir -p out/ios/Release-iphoneos
        cd out/ios/Release-iphoneos
        
        gn gen . --args="target_os=\"ios\" target_cpu=\"arm64\" is_debug=false" --root=foundation/arkui/ace_engine
        
        ninja -j$(sysctl -n hw.ncpu) libarkui_ios
        
        cd ../..
        
        if [ -f "out/ios/Release-iphoneos/obj/ace/libarkui_ios.a" ]; then
          echo "✅ libarkui_ios.a built successfully"
          ls -la out/ios/Release-iphoneos/obj/ace/libarkui_ios.a
        else
          echo "❌ libarkui_ios.a build failed or not found"
          exit 1
        fi

    - name: Build ArkUIPlayer
      run: |
        echo "🔍 Building ArkUIPlayer app..."
        
        xcodebuild -project ArkUIPlayer/ArkUIPlayer.xcodeproj \
          -scheme ArkUIPlayer \
          -destination 'generic/platform=iOS' \
          -configuration Debug \
          build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          IPHONEOS_DEPLOYMENT_TARGET=13.0
        
        echo "✅ ArkUIPlayer build completed successfully"

    - name: Archive ArkUIPlayer
      run: |
        echo "🔍 Archiving ArkUIPlayer app..."
        
        xcodebuild -project ArkUIPlayer/ArkUIPlayer.xcodeproj \
          -scheme ArkUIPlayer \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          archive \
          -archivePath ArkUIPlayer.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          IPHONEOS_DEPLOYMENT_TARGET=13.0
        
        echo "✅ ArkUIPlayer archive completed successfully"

    - name: Package unsigned IPA manually
      run: |
        echo "🔍 Packaging unsigned IPA manually..."
        
        APP_PATH=$(find ArkUIPlayer.xcarchive -name "*.app" | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ .app file not found in xcarchive!"
          ls -la ArkUIPlayer.xcarchive/Products/Applications/ 2>/dev/null || echo "Directory does not exist"
          exit 1
        fi
        
        echo "Found .app at: $APP_PATH"
        
        mkdir -p ArkUIPlayer-IPA/Payload
        cp -r "$APP_PATH" ArkUIPlayer-IPA/Payload/
        
        cd ArkUIPlayer-IPA
        zip -r ArkUIPlayer.ipa Payload/
        cd ..
        
        echo "✅ Unsigned IPA packaged successfully"

    - name: Verify unsigned IPA
      run: |
        echo "🔍 Verifying unsigned IPA..."
        
        ls -la ArkUIPlayer-IPA/
        
        if [ -f "ArkUIPlayer-IPA/ArkUIPlayer.ipa" ]; then
          echo "✅ IPA file exists: ArkUIPlayer-IPA/ArkUIPlayer.ipa"
          file_size=$(du -sh ArkUIPlayer-IPA/ArkUIPlayer.ipa | cut -f1)
          echo "✅ IPA size: $file_size"
        else
          echo "❌ IPA file not found!"
          exit 1
        fi

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: ArkUIPlayer-unsigned
        path: ArkUIPlayer-IPA/ArkUIPlayer.ipa
        retention-days: 7
