name: ArkUIPlayer Build CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.mm'
      - '**.m'
      - '.github/workflows/build.yml'
      - 'ArkUIPlayer/**'
      - 'foundation/**'
      - 'base/**'
      - 'commonlibrary/**'
  pull_request:
    branches: [ main, develop ]

jobs:
  build-app:
    name: Build ArkUIPlayer App
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Clean workspace
      run: |
        echo "🔍 Cleaning workspace..."
        rm -rf foundation base commonlibrary out build ArkUIPlayer.xcarchive ArkUIPlayer-IPA

    - name: Install system dependencies
      run: |
        echo "🔍 Installing system dependencies..."
        brew install wget gnu-tar 2>/dev/null || true
        echo "✅ System dependencies installed"

    - name: Install Node.js and ACE Tools
      run: |
        echo "🔍 Installing Node.js and ACE Tools..."
        
        if ! command -v node &> /dev/null; then
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 16
          nvm use 16
        fi
        
        echo "Node.js version: $(node --version)"
        echo "npm version: $(npm --version)"
        
        npm install -g @arkui-x/ace-tools 2>&1 || true
        
        if command -v ace &> /dev/null; then
          echo "✅ ACE Tools installed: $(ace --version)"
        else
          echo "⚠️ ACE Tools installation failed, trying alternative..."
          npm install -g @arkui-x/ace-cli 2>&1 || true
        fi

    - name: Download ArkUI-X SDK using ACE Tools
      continue-on-error: true
      run: |
        echo "🔍 Downloading ArkUI-X SDK..."
        
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        nvm use 16
        
        if command -v ace &> /dev/null; then
          echo "Using ACE Tools to download SDK..."
          ace sdk install 2>&1 || true
        fi
        
        SDK_DIR="$HOME/Library/ArkUI-X/Sdk"
        echo "Checking SDK directory: $SDK_DIR"
        ls -la "$SDK_DIR" 2>/dev/null || echo "SDK directory not found"
        
        find "$SDK_DIR" -name "libarkui_ios*" 2>/dev/null || echo "libarkui_ios not found in SDK"

    - name: Download ArkUI-X SDK manually
      continue-on-error: true
      run: |
        echo "🔍 Downloading ArkUI-X SDK manually..."
        
        SDK_URLS=(
          "https://repo.huaweicloud.com/arkui-x/sdk/10/arkui-x/arkui-x_darwin_x64_10.0.0.0_Release.zip"
          "https://gitee.com/arkui-x/arkui-x/releases/download/1.0.0.0/arkui-x_darwin_x64_1.0.0.0_Release.zip"
          "https://gitee.com/openharmony-sig/arkui_ace_engine/releases/download/10.0.0.0/arkui-x_darwin_x64_10.0.0.0_Release.zip"
        )
        
        for url in "${SDK_URLS[@]}"; do
          echo "Trying: $url"
          if curl -L "$url" -o arkui-x-sdk.zip --fail --max-time 120; then
            file_type=$(file -b arkui-x-sdk.zip)
            echo "File type: $file_type"
            if echo "$file_type" | grep -q -i "zip"; then
              unzip -o arkui-x-sdk.zip -d arkui-x-sdk/ 2>&1 || true
              rm arkui-x-sdk.zip
              
              find arkui-x-sdk -name "libarkui_ios*" 2>/dev/null
              find arkui-x-sdk -name "*.xcframework" 2>/dev/null
              
              echo "✅ SDK downloaded successfully"
              break
            else
              echo "⚠️ Not a valid zip file, skipping"
              rm arkui-x-sdk.zip
            fi
          else
            echo "⚠️ Download failed: $url"
          fi
        done

    - name: Copy ArkUI-X framework to project
      run: |
        echo "🔍 Copying ArkUI-X framework to project..."
        
        SDK_DIRS=(
          "$HOME/Library/ArkUI-X/Sdk"
          "./arkui-x-sdk"
          "./arkui-x"
        )
        
        for dir in "${SDK_DIRS[@]}"; do
          if [ -d "$dir" ]; then
            echo "Searching in: $dir"
            
            XCFRAMEWORK=$(find "$dir" -name "libarkui_ios.xcframework" 2>/dev/null | head -1)
            FRAMEWORK=$(find "$dir" -name "libarkui_ios.framework" 2>/dev/null | head -1)
            
            if [ -n "$XCFRAMEWORK" ]; then
              echo "✅ Found XCFramework at: $XCFRAMEWORK"
              mkdir -p ArkUIPlayer/Frameworks
              cp -r "$XCFRAMEWORK" ArkUIPlayer/Frameworks/
              echo "✅ Copied XCFramework to Frameworks"
              break
            elif [ -n "$FRAMEWORK" ]; then
              echo "✅ Found Framework at: $FRAMEWORK"
              mkdir -p ArkUIPlayer/Frameworks
              cp -r "$FRAMEWORK" ArkUIPlayer/Frameworks/
              echo "✅ Copied Framework to Frameworks"
              break
            fi
          fi
        done
        
        if [ -d "ArkUIPlayer/Frameworks/libarkui_ios.xcframework" ]; then
          echo "✅ libarkui_ios.xcframework found in project"
          sed -i '' 's/#define HAS_ARKUI_X 0/#define HAS_ARKUI_X 1/' ArkUIPlayer/ArkUIPlayer/HAPManager.h
          echo "✅ Set HAS_ARKUI_X=1"
        else
          echo "⚠️ libarkui_ios framework not found, proceeding without ArkUI-X integration"
        fi

    - name: Configure Xcode project for ArkUI-X
      run: |
        echo "🔍 Checking if libarkui_ios framework exists..."
        
        XCFRAMEWORK_PATH="ArkUIPlayer/Frameworks/libarkui_ios.xcframework"
        
        if [ -d "$XCFRAMEWORK_PATH" ]; then
          echo "✅ libarkui_ios.xcframework found"
          echo "Configuring Xcode project for ArkUI-X..."
          
          PBX_PROJ="ArkUIPlayer/ArkUIPlayer.xcodeproj/project.pbxproj"
          
          if [ -f "$PBX_PROJ" ]; then
            echo "📝 Updating Xcode project file for XCFramework..."
            
            sed -i '' 's|HEADER_SEARCH_PATHS = |HEADER_SEARCH_PATHS = "$(SRCROOT)/Frameworks/libarkui_ios.xcframework/ios-arm64/libarkui_ios.framework/Headers" "$(SRCROOT)/Frameworks/libarkui_ios.xcframework/ios-arm64_x86_64-simulator/libarkui_ios.framework/Headers" |g' "$PBX_PROJ"
            
            sed -i '' 's|LIBRARY_SEARCH_PATHS = |LIBRARY_SEARCH_PATHS = "$(SRCROOT)/Frameworks" |g' "$PBX_PROJ"
            
            sed -i '' 's|OTHER_LDFLAGS = |OTHER_LDFLAGS = -framework libarkui_ios |g' "$PBX_PROJ"
            
            echo "✅ Xcode project updated with ArkUI-X XCFramework paths"
          fi
          
          echo "✅ Xcode project configured for ArkUI-X"
        else
          echo "⚠️ libarkui_ios framework not found, proceeding without ArkUI-X integration"
        fi

    - name: Build ArkUIPlayer using xcodebuild
      run: |
        echo "🔍 Building ArkUIPlayer app..."
        
        cd ArkUIPlayer
        
        xcodebuild -project ArkUIPlayer.xcodeproj \
          -scheme ArkUIPlayer \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath build \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          IPHONEOS_DEPLOYMENT_TARGET=13.0 2>&1 || { echo "❌ Build failed"; exit 1; }
        
        echo "✅ Build completed"
        
        echo "Searching for .app files..."
        find build -name "*.app" -type d 2>/dev/null
        
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Found .app at: $APP_PATH"
          ls -la "$APP_PATH/"
          du -sh "$APP_PATH"
        else
          echo "❌ .app file not found!"
          exit 1
        fi

    - name: Package unsigned IPA manually
      run: |
        echo "🔍 Packaging unsigned IPA manually..."
        
        cd ArkUIPlayer
        
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ .app file not found!"
          exit 1
        fi
        
        echo "Found .app at: $APP_PATH"
        ls -la "$APP_PATH/"
        du -sh "$APP_PATH"
        
        mkdir -p ArkUIPlayer-IPA/Payload
        cp -r "$APP_PATH" ArkUIPlayer-IPA/Payload/
        
        echo "Listing Payload directory:"
        ls -la ArkUIPlayer-IPA/Payload/
        
        cd ArkUIPlayer-IPA
        zip -r ArkUIPlayer.ipa Payload/
        cd ..
        
        echo "✅ Unsigned IPA packaged successfully"
        
        ls -la ArkUIPlayer-IPA/
        du -sh ArkUIPlayer-IPA/ArkUIPlayer.ipa

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: ArkUIPlayer-unsigned
        path: ArkUIPlayer/ArkUIPlayer-IPA/ArkUIPlayer.ipa
        retention-days: 7
