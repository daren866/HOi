name: ArkUIPlayer Build CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.mm'
      - '**.m'
      - '.github/workflows/build.yml'
      - 'ArkUIPlayer/**'
      - 'foundation/**'
      - 'base/**'
      - 'commonlibrary/**'
  pull_request:
    branches: [ main, develop ]

jobs:
  build-app:
    name: Build ArkUIPlayer App
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Clean workspace
      run: |
        echo "🔍 Cleaning workspace..."
        rm -rf foundation base commonlibrary out build ArkUIPlayer.xcarchive ArkUIPlayer-IPA

    - name: Install system dependencies
      run: |
        echo "🔍 Installing system dependencies..."
        brew install wget gnu-tar 2>/dev/null || true
        echo "✅ System dependencies installed"

    - name: Install GN and Ninja
      continue-on-error: true
      run: |
        echo "🔍 Installing GN and Ninja..."
        
        if ! command -v ninja &> /dev/null; then
          echo "Installing Ninja..."
          curl -L https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-mac.zip -o ninja.zip
          unzip -o ninja.zip -d /usr/local/bin/
          rm ninja.zip
        fi
        
        if command -v ninja &> /dev/null; then
          echo "✅ Ninja installed: $(ninja --version)"
        else
          echo "⚠️ Ninja installation failed"
        fi
        
        if ! command -v gn &> /dev/null; then
          echo "Installing GN..."
          
          if brew install gn 2>/dev/null; then
            echo "✅ GN installed via brew"
          else
            echo "⚠️ Brew install failed, trying prebuilt binaries..."
            
            GN_URLS=(
              "https://github.com/nicocha30/gn-build/releases/download/gn-v0.2455.9b987f0/gn-macos-x86_64.zip"
              "https://storage.googleapis.com/chrome-infra-packages/gn/mac-amd64/gn.zip"
              "https://github.com/acgtyrant/gn-build/releases/download/v0.1.0/gn-macos-amd64.zip"
            )
            
            for url in "${GN_URLS[@]}"; do
              echo "Trying: $url"
              if curl -L "$url" -o gn.zip --fail --max-time 30; then
                file_type=$(file -b gn.zip)
                echo "File type: $file_type"
                if echo "$file_type" | grep -q -i "zip"; then
                  unzip -o gn.zip -d /usr/local/bin/ 2>/dev/null
                  rm gn.zip
                  if command -v gn &> /dev/null; then
                    echo "✅ GN installed from $url"
                    break
                  fi
                else
                  echo "⚠️ Not a valid zip file, skipping"
                  rm gn.zip
                fi
              fi
            done
          fi
        fi
        
        if command -v gn &> /dev/null; then
          echo "✅ GN installed: $(gn --version)"
        else
          echo "⚠️ GN installation failed"
        fi

    - name: Download ArkUI-X core dependencies
      continue-on-error: true
      run: |
        echo "🔍 Downloading ArkUI-X core dependencies..."
        
        git config --global credential.helper ""
        export GIT_TERMINAL_PROMPT=0
        
        REPO_MAP=(
          "foundation/arkui/ace_engine|https://gitee.com/openharmony/arkui_ace_engine.git"
          "foundation/appframework|https://gitee.com/arkui-x/app_framework.git"
          "foundation/arkui/napi|https://gitee.com/openharmony/arkui_napi.git"
          "foundation/graphic/graphic_2d|https://gitee.com/openharmony/graphic_graphic_2d.git"
          "foundation/multimedia/image_framework|https://gitee.com/openharmony/multimedia_image_framework.git"
          "foundation/filemanagement/file_api|https://gitee.com/openharmony/filemanagement_file_api.git"
          "foundation/communication/netmanager_base|https://gitee.com/openharmony/communication_netmanager_base.git"
          "arkcompiler/runtime_core|https://gitee.com/openharmony/arkcompiler_runtime_core.git"
          "arkcompiler/ets_runtime|https://gitee.com/openharmony/arkcompiler_ets_runtime.git"
          "commonlibrary/c_utils|https://gitee.com/openharmony/commonlibrary_c_utils.git"
          "base/hiviewdfx/hilog|https://gitee.com/openharmony/hiviewdfx_hilog.git"
          "base/global/resource_management|https://gitee.com/openharmony/global_resource_management.git"
          "build|https://gitee.com/openharmony/build.git"
          "build_plugins|https://gitee.com/arkui-x/build_plugins.git"
          "plugins|https://gitee.com/arkui-x/plugins.git"
          "third_party|https://gitee.com/openharmony/third_party.git"
          "interfaces/inner_api|https://gitee.com/openharmony/interfaces_inner_api.git"
          "interfaces/native|https://gitee.com/openharmony/interfaces_native.git"
        )
        
        for entry in "${REPO_MAP[@]}"; do
          REPO_PATH=$(echo "$entry" | cut -d'|' -f1)
          REPO_URL=$(echo "$entry" | cut -d'|' -f2)
          
          if [ -d "$REPO_PATH" ]; then
            echo "⚠️ $REPO_PATH already exists, skipping"
            continue
          fi
          
          echo "📥 Cloning $REPO_PATH..."
          
          mkdir -p "$(dirname "$REPO_PATH")"
          
          if git clone --depth 1 "$REPO_URL" "$REPO_PATH" 2>&1; then
            echo "✅ $REPO_PATH cloned successfully"
          else
            echo "❌ $REPO_PATH clone failed"
          fi
        done
        
        echo "📊 Dependency download summary:"
        ls -la foundation/arkui/ 2>/dev/null || echo "foundation/arkui/ not found"
        ls -la foundation/appframework/ 2>/dev/null || echo "foundation/appframework/ not found"
        ls -la build/ 2>/dev/null || echo "build/ not found"

    - name: Setup directory structure
      run: |
        echo "🔍 Setting up directory structure..."
        
        if [ ! -d "foundation/arkui/ace_engine" ]; then
          mkdir -p foundation/arkui/ace_engine
        fi
        
        ln -sf "$(pwd)/foundation/arkui/ace_engine" "$(pwd)/ace_engine" 2>/dev/null || true
        
        echo "✅ Directory structure set up"

    - name: Build libarkui_ios.a
      continue-on-error: true
      run: |
        echo "🔍 Building libarkui_ios.a..."
        
        if ! command -v gn &> /dev/null || ! command -v ninja &> /dev/null; then
          echo "⚠️ GN or Ninja not available, skipping build"
          exit 0
        fi
        
        if [ ! -d "foundation/arkui/ace_engine" ]; then
          echo "⚠️ ace_engine not found, skipping build"
          exit 0
        fi
        
        if [ ! -d "build" ]; then
          echo "⚠️ build directory not found, skipping build"
          exit 0
        fi
        
        ROOT_DIR=$(pwd)
        echo "Root directory: $ROOT_DIR"
        
        cd foundation/arkui/ace_engine
        
        mkdir -p out/ios
        
        echo "Generating GN build files..."
        gn gen out/ios --args='target_os="ios" target_cpu="arm64" ios_deployment_target="13.0" is_debug=false use_ios_simulator=false' --root="$ROOT_DIR"
        
        if [ $? -ne 0 ]; then
          echo "❌ GN gen failed"
          exit 0
        fi
        
        echo "Building libarkui_ios..."
        ninja -C out/ios ace_packages 2>&1 | tail -100
        
        LIB_PATH=$(find out -name "libarkui_ios.a" 2>/dev/null | head -1)
        
        if [ -n "$LIB_PATH" ]; then
          echo "✅ libarkui_ios.a built successfully at: $LIB_PATH"
          ls -la "$LIB_PATH"
          du -sh "$LIB_PATH"
          
          cp "$LIB_PATH" "$ROOT_DIR/libarkui_ios.a"
          echo "✅ Copied libarkui_ios.a to project root"
        else
          echo "❌ libarkui_ios.a not found after build"
          find out -name "*.a" 2>/dev/null | head -20
        fi
        
        cd "$ROOT_DIR"

    - name: Configure Xcode project for ArkUI-X
      run: |
        echo "🔍 Checking if libarkui_ios.a exists..."
        
        LIB_PATH=$(find . -name "libarkui_ios.a" 2>/dev/null | head -1)
        
        if [ -n "$LIB_PATH" ]; then
          echo "✅ libarkui_ios.a found at: $LIB_PATH"
          echo "Configuring Xcode project for ArkUI-X..."
          
          sed -i '' 's/#define HAS_ARKUI_X 0/#define HAS_ARKUI_X 1/' ArkUIPlayer/ArkUIPlayer/HAPManager.h
          
          PBX_PROJ="ArkUIPlayer/ArkUIPlayer.xcodeproj/project.pbxproj"
          
          if [ -f "$PBX_PROJ" ]; then
            echo "📝 Updating Xcode project file..."
            
            sed -i '' 's|HEADER_SEARCH_PATHS = |HEADER_SEARCH_PATHS = "$(SRCROOT)/../foundation/arkui/ace_engine" "$(SRCROOT)/../foundation/arkui/ace_engine/frameworks" "$(SRCROOT)/../foundation/arkui/ace_engine/interfaces" "$(SRCROOT)/../foundation/arkui/ace_engine/adapter/ios" "$(SRCROOT)/../foundation/appframework" "$(SRCROOT)/../commonlibrary/c_utils" "$(SRCROOT)/../base/hiviewdfx/hilog" "$(SRCROOT)/../foundation/graphic/graphic_2d" "$(SRCROOT)/../third_party" |g' "$PBX_PROJ"
            
            sed -i '' 's|LIBRARY_SEARCH_PATHS = |LIBRARY_SEARCH_PATHS = "$(SRCROOT)/.." |g' "$PBX_PROJ"
            
            sed -i '' 's|OTHER_LDFLAGS = |OTHER_LDFLAGS = -force_load "$(SRCROOT)/../libarkui_ios.a" |g' "$PBX_PROJ"
            
            echo "✅ Xcode project updated with ArkUI-X paths"
          fi
          
          echo "✅ Xcode project configured for ArkUI-X"
        else
          echo "⚠️ libarkui_ios.a not found, proceeding without ArkUI-X integration"
        fi

    - name: Build ArkUIPlayer using xcodebuild
      run: |
        echo "🔍 Building ArkUIPlayer app..."
        
        cd ArkUIPlayer
        
        xcodebuild -project ArkUIPlayer.xcodeproj \
          -scheme ArkUIPlayer \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath build \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          IPHONEOS_DEPLOYMENT_TARGET=13.0 2>&1 || { echo "❌ Build failed"; exit 1; }
        
        echo "✅ Build completed"
        
        echo "Searching for .app files..."
        find build -name "*.app" -type d 2>/dev/null
        
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Found .app at: $APP_PATH"
          ls -la "$APP_PATH/"
          du -sh "$APP_PATH"
        else
          echo "❌ .app file not found!"
          exit 1
        fi

    - name: Package unsigned IPA manually
      run: |
        echo "🔍 Packaging unsigned IPA manually..."
        
        cd ArkUIPlayer
        
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ .app file not found!"
          exit 1
        fi
        
        echo "Found .app at: $APP_PATH"
        ls -la "$APP_PATH/"
        du -sh "$APP_PATH"
        
        mkdir -p ArkUIPlayer-IPA/Payload
        cp -r "$APP_PATH" ArkUIPlayer-IPA/Payload/
        
        echo "Listing Payload directory:"
        ls -la ArkUIPlayer-IPA/Payload/
        
        cd ArkUIPlayer-IPA
        zip -r ArkUIPlayer.ipa Payload/
        cd ..
        
        echo "✅ Unsigned IPA packaged successfully"
        
        ls -la ArkUIPlayer-IPA/
        du -sh ArkUIPlayer-IPA/ArkUIPlayer.ipa

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: ArkUIPlayer-unsigned
        path: ArkUIPlayer/ArkUIPlayer-IPA/ArkUIPlayer.ipa
        retention-days: 7
